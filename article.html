<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل المقال...</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        body.page-loading .article-detail {
            opacity: 0;
            visibility: hidden;
        }
        body.page-ready .article-detail {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.2s ease-in-out;
        }
        .article-loader {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 220px);
            color: #64748b;
            text-align: center;
            gap: 16px;
        }
        .article-loader .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(37,99,235,0.2);
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 15px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999;
        }
        .back-btn:hover {
            background: #333;
        }
    </style>
</head>
<body class="page-loading">
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">مدونة المعرفة</a>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li class="dropdown">
                        <span class="dropdown-toggle">التصنيفات ▼</span>
                        <div class="dropdown-menu" id="category-dropdown">
                            <!-- Dynamically populated by JS -->
                            <div style="padding: 10px 20px;">جاري التحميل...</div>
                        </div>
                    </li>
                    <li><a href="categories.html">جميع التصنيفات</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html">اتصل بنا</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" id="article-content-wrapper">
        <div id="article-content">
            <div class="article-loader">
                <div class="spinner"></div>
                <p>جاري تحميل المقال...</p>
            </div>
        </div>
        <button onclick="goBack()" class="back-btn">← رجوع</button>
    </main>

    <footer>
        <div class="container footer-content">
            <div>
                <h3>مدونة المعرفة</h3>
                <p>منصتكم الشاملة لكل ما يخص الأخبار، الوظائف، والتعليم.</p>
            </div>
            <div>
                <h4>روابط سريعة</h4>
                <ul>
                    <li><a href="/">الرئيسية</a></li>
                    <li><a href="/admin/">لوحة التحكم</a></li>
                </ul>
            </div>
        </div>
        <div class="container" style="text-align: center; margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <p>© 2026 مدونة المعرفة. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script defer src="./script.js"></script>
</body>
</html>
