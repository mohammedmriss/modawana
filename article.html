<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل المقال...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --container-width: 1200px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Tajawal', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            direction: rtl;
        }
        a { color: inherit; text-decoration: none; }
        .container { max-width: var(--container-width); margin: 0 auto; padding: 0 20px; }
        header { position: sticky; top: 0; z-index: 1000; background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
        nav { display: flex; justify-content: space-between; align-items: center; min-height: 70px; gap: 20px; }
        .logo { color: var(--primary-color); font-size: 1.5rem; font-weight: 800; }
        .nav-links { display: flex; align-items: center; gap: 25px; list-style: none; }
        main { min-height: calc(100vh - 140px); }
        #article-content { min-height: calc(100vh - 260px); }
        .article-loader { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: calc(100vh - 260px); color: var(--secondary-color); text-align: center; gap: 16px; }
        .spinner { width: 48px; height: 48px; border: 5px solid rgba(37,99,235,.2); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #article-content .article-detail { display: none; }
        #article-content.ready .article-detail { display: block; }
        #article-content.ready .article-loader { display: none; }
        .article-detail { max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; }
        .article-detail img { width: 100%; border-radius: 12px; margin-bottom: 30px; }
        .article-category { display: inline-block; margin-bottom: 10px; padding: 4px 12px; border-radius: 20px; background: #eff6ff; color: var(--primary-color); font-size: .85rem; }
        .article-date { color: var(--secondary-color); font-size: .9rem; }
        .article-content { font-size: 1.15rem; line-height: 1.8; }
        .back-btn { position: fixed; top: 15px; left: 15px; z-index: 1002; padding: 10px 15px; border: 0; border-radius: 8px; background: #111; color: #fff; cursor: pointer; font-family: inherit; }
        footer { margin-top: 80px; padding: 50px 0 20px; background: #1e293b; color: #fff; }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .article-detail { padding: 24px; margin: 24px auto; }
        }
    </style>
    <link rel="stylesheet" href="/modawana/style.css?v=20260506-3">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">مدونة المعرفة</a>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li class="dropdown">
                        <span class="dropdown-toggle">التصنيفات ▼</span>
                        <div class="dropdown-menu" id="category-dropdown">
                            <!-- Dynamically populated by JS -->
                            <div style="padding: 10px 20px;">جاري التحميل...</div>
                        </div>
                    </li>
                    <li><a href="categories.html">جميع التصنيفات</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html">اتصل بنا</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" id="article-content-wrapper">
        <div id="article-content">
            <div class="article-loader">
                <div class="spinner"></div>
                <p>جاري تحميل المقال...</p>
            </div>
        </div>
        <button onclick="goBack()" class="back-btn">← رجوع</button>
    </main>

    <footer>
        <div class="container footer-content">
            <div>
                <h3>مدونة المعرفة</h3>
                <p>منصتكم الشاملة لكل ما يخص الأخبار، الوظائف، والتعليم.</p>
            </div>
            <div>
                <h4>روابط سريعة</h4>
                <ul>
                    <li><a href="/">الرئيسية</a></li>
                    <li><a href="/admin/">لوحة التحكم</a></li>
                </ul>
            </div>
        </div>
        <div class="container" style="text-align: center; margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <p>© 2026 مدونة المعرفة. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script defer src="/modawana/script.js?v=20260506-3"></script>
</body>
</html>
