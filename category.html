<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>تصفح التصنيف | مدونة المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">مدونة المعرفة</a>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li class="dropdown">
                        <span class="dropdown-toggle">التصنيفات ▼</span>
                        <div class="dropdown-menu" id="category-dropdown">

                    </li>

            <div>
                <h3>مدونة المعرفة</h3>
                <p>منصتكم الشاملة لكل ما يخص الأخبار، الوظائف، والتعليم.</p>

        </div>
        <div class="container" style="text-align: center; margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
