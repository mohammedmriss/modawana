<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | مدونة المعرفة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=20260506">
    <style>
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">مدونة المعرفة</a>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li class="dropdown">
                        <span class="dropdown-toggle">التصنيفات ▼</span>
                        <div class="dropdown-menu" id="category-dropdown">
                            <!-- Dynamically populated by JS -->
                            <div style="padding: 10px 20px;">جاري التحميل...</div>
                        </div>
                    </li>
                    <li><a href="categories.html">جميع التصنيفات</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html" class="active">اتصل بنا</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; margin: 40px 0;">
            <h1>اتصل بنا</h1>
            <p>لديك سؤال أو اقتراح؟ يسعدنا تواصلك معنا.</p>
        </div>

        <form class="contact-form" onsubmit="event.preventDefault(); alert('تم إرسال رسالتك بنجاح! شكراً لك.'); this.reset();">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" placeholder="أدخل اسمك هنا" required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>الموضوع</label>
                <input type="text" placeholder="عنوان الرسالة" required>
            </div>
            <div class="form-group">
                <label>الرسالة</label>
                <textarea rows="5" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">إرسال الرسالة</button>
        </form>
    </main>

    <footer>
        <div class="container footer-content">
            <div>
                <h3>مدونة المعرفة</h3>
                <p>منصتكم الشاملة لكل ما يخص الأخبار، الوظائف، والتعليم.</p>
            </div>
        </div>
        <div class="container" style="text-align: center; margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <p>© 2026 مدونة المعرفة. جميع الحقوق محفوظة.</p>
        </div>
    </footer>
    <script defer src="./script.js?v=20260506"></script>
</body>
</html>
